<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drs' Visual Arts Center</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            text-align: center;
            padding: 40px 0;
        }
        header h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        header p {
            color: #888;
            font-size: 1.1rem;
        }
        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 30px 0;
        }
        .tab {
            padding: 12px 30px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 25px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
        }
        .tab.active {
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
        }
        .tab:hover {
            background: rgba(255,255,255,0.2);
        }
        .panel {
            display: none;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(10px);
        }
        .panel.active {
            display: block;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #aaa;
            font-size: 0.9rem;
        }
        textarea, select, input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s;
        }
        textarea {
            min-height: 100px;
            resize: vertical;
        }
        textarea:focus, select:focus, input:focus {
            outline: none;
            border-color: #00d4ff;
        }
        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .price-tag {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(0,212,255,0.2);
            border-radius: 15px;
            font-size: 0.85rem;
            color: #00d4ff;
            margin-left: 10px;
        }
        .generate-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }
        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,212,255,0.3);
        }
        .generate-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .result {
            margin-top: 30px;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            display: none;
        }
        .result.show {
            display: block;
        }
        .result img, .result video {
            max-width: 100%;
            border-radius: 10px;
            margin-top: 15px;
        }
        .status {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        .status.pending {
            background: rgba(255,193,7,0.2);
            color: #ffc107;
        }
        .status.success {
            background: rgba(40,167,69,0.2);
            color: #28a745;
        }
        .status.error {
            background: rgba(220,53,69,0.2);
            color: #dc3545;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .gallery-item {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s;
        }
        .gallery-item:hover {
            transform: scale(1.02);
        }
        .gallery-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .gallery-item .info {
            padding: 15px;
        }
        .gallery-item .info h4 {
            margin-bottom: 5px;
            font-size: 0.9rem;
        }
        .gallery-item .info p {
            color: #888;
            font-size: 0.8rem;
        }
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }
        .loading.show {
            display: block;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎨 Drs' Visual Arts Center</h1>
            <p>AI 图像与视频生成平台</p>
        </header>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('image')">🖼️ 图像生成</button>
            <button class="tab" onclick="switchTab('video')">🎬 视频生成</button>
            <button class="tab" onclick="switchTab('gallery')">📁 作品库</button>
        </div>

        <!-- 图像生成面板 -->
        <div id="image-panel" class="panel active">
            <div class="form-group">
                <label>提示词 (Prompt)</label>
                <textarea id="image-prompt" placeholder="描述你想要生成的图像..."></textarea>
            </div>
            <div class="row">
                <div class="form-group">
                    <label>选择模型</label>
                    <select id="image-model">
                        <option value="flux">Flux <span class="price-tag">¥0.01</span></option>
                        <option value="midjourney">Midjourney <span class="price-tag">¥1.00</span></option>
                        <option value="grok-4.1-image">Grok 4.1 Image <span class="price-tag">¥0.10</span></option>
                        <option value="grok-4.2-image">Grok 4.2 Image <span class="price-tag">¥0.12</span></option>
                        <option value="seedream-3.0">Seedream 3.0 <span class="price-tag">¥0.10</span></option>
                    </select>
                </div>
                <div class="form-group">
                    <label>图像尺寸</label>
                    <select id="image-size">
                        <option value="1024x1024">1024 × 1024 (方形)</option>
                        <option value="1024x1536">1024 × 1536 (竖屏)</option>
                        <option value="1536x1024">1536 × 1024 (横屏)</option>
                    </select>
                </div>
            </div>
            <button class="generate-btn" onclick="generateImage()">生成图像</button>
            
            <div class="loading" id="image-loading">
                <div class="spinner"></div>
                <p>正在生成图像...</p>
            </div>
            
            <div class="result" id="image-result">
                <div class="status" id="image-status"></div>
                <img id="image-output" src="" alt="生成的图像">
            </div>
        </div>

        <!-- 视频生成面板 -->
        <div id="video-panel" class="panel">
            <div class="form-group">
                <label>提示词 (Prompt)</label>
                <textarea id="video-prompt" placeholder="描述你想要生成的视频..."></textarea>
            </div>
            <div class="row">
                <div class="form-group">
                    <label>选择模型</label>
                    <select id="video-model">
                        <option value="kling-o1">Kling O1 <span class="price-tag">¥0.80</span></option>
                        <option value="wan2.2-flash">Wan 2.2 Flash <span class="price-tag">¥0.80</span></option>
                        <option value="kling-v2-6">Kling V2.6 <span class="price-tag">¥2.50</span></option>
                    </select>
                </div>
                <div class="form-group">
                    <label>视频时长</label>
                    <select id="video-duration">
                        <option value="5">5 秒</option>
                        <option value="10">10 秒</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>画面比例</label>
                <select id="video-ratio">
                    <option value="16:9">16:9 横屏</option>
                    <option value="9:16">9:16 竖屏</option>
                    <option value="1:1">1:1 方形</option>
                </select>
            </div>
            <button class="generate-btn" onclick="generateVideo()">生成视频</button>
            
            <div class="loading" id="video-loading">
                <div class="spinner"></div>
                <p>正在生成视频，这可能需要几分钟...</p>
            </div>
            
            <div class="result" id="video-result">
                <div class="status" id="video-status"></div>
                <video id="video-output" controls></video>
            </div>
        </div>

        <!-- 作品库面板 -->
        <div id="gallery-panel" class="panel">
            <div class="gallery" id="gallery-grid">
                <!-- 动态加载 -->
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tab + '-panel').classList.add('active');
            
            if (tab === 'gallery') {
                loadGallery();
            }
        }
        
        async function generateImage() {
            const prompt = document.getElementById('image-prompt').value;
            const model = document.getElementById('image-model').value;
            const size = document.getElementById('image-size').value;
            
            if (!prompt) {
                alert('请输入提示词');
                return;
            }
            
            document.getElementById('image-loading').classList.add('show');
            document.getElementById('image-result').classList.remove('show');
            
            try {
                const response = await fetch(`${API_BASE}/api/generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        mode: 'text-to-image',
                        prompt,
                        model,
                        size
                    })
                });
                
                const data = await response.json();
                
                if (data.success && data.images) {
                    document.getElementById('image-status').className = 'status success';
                    document.getElementById('image-status').textContent = `✅ 生成成功！价格: ${data.price || '未知'}`;
                    document.getElementById('image-output').src = data.images[0].url;
                    document.getElementById('image-result').classList.add('show');
                    saveToGallery('image', data.images[0].url, prompt, model);
                } else {
                    throw new Error(data.error || '生成失败');
                }
            } catch (err) {
                document.getElementById('image-status').className = 'status error';
                document.getElementById('image-status').textContent = '❌ ' + err.message;
                document.getElementById('image-result').classList.add('show');
            } finally {
                document.getElementById('image-loading').classList.remove('show');
            }
        }
        
        async function generateVideo() {
            const prompt = document.getElementById('video-prompt').value;
            const model = document.getElementById('video-model').value;
            const duration = document.getElementById('video-duration').value;
            const ratio = document.getElementById('video-ratio').value;
            
            if (!prompt) {
                alert('请输入提示词');
                return;
            }
            
            document.getElementById('video-loading').classList.add('show');
            document.getElementById('video-result').classList.remove('show');
            
            try {
                const response = await fetch(`${API_BASE}/api/generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        mode: 'text-to-video',
                        prompt,
                        model,
                        duration: parseInt(duration),
                        aspectRatio: ratio
                    })
                });
                
                const data = await response.json();
                
                if (data.success && data.jobId) {
                    document.getElementById('video-status').className = 'status pending';
                    document.getElementById('video-status').textContent = `⏳ 任务已提交: ${data.jobId}，正在处理...`;
                    document.getElementById('video-result').classList.add('show');
                    
                    // 轮询状态
                    pollVideoStatus(data.jobId, model);
                } else {
                    throw new Error(data.error || '提交失败');
                }
            } catch (err) {
                document.getElementById('video-status').className = 'status error';
                document.getElementById('video-status').textContent = '❌ ' + err.message;
                document.getElementById('video-result').classList.add('show');
                document.getElementById('video-loading').classList.remove('show');
            }
        }
        
        async function pollVideoStatus(jobId, model) {
            const checkStatus = async () => {
                try {
                    const response = await fetch(`${API_BASE}/api/status?jobId=${jobId}&model=${model}`);
                    const data = await response.json();
                    
                    if (data.status === 'completed' || data.status === 'succeeded') {
                        document.getElementById('video-status').className = 'status success';
                        document.getElementById('video-status').textContent = '✅ 视频生成完成！';
                        document.getElementById('video-output').src = data.videoUrl;
                        document.getElementById('video-loading').classList.remove('show');
                        saveToGallery('video', data.videoUrl, document.getElementById('video-prompt').value, model);
                    } else if (data.status === 'failed' || data.status === 'error') {
                        throw new Error(data.message || '生成失败');
                    } else {
                        setTimeout(checkStatus, 5000);
                    }
                } catch (err) {
                    document.getElementById('video-status').className = 'status error';
                    document.getElementById('video-status').textContent = '❌ ' + err.message;
                    document.getElementById('video-loading').classList.remove('show');
                }
            };
            
            checkStatus();
        }
        
        function saveToGallery(type, url, prompt, model) {
            const gallery = JSON.parse(localStorage.getItem('gallery') || '[]');
            gallery.unshift({
                type,
                url,
                prompt,
                model,
                time: new Date().toISOString()
            });
            localStorage.setItem('gallery', JSON.stringify(gallery.slice(0, 50)));
        }
        
        function loadGallery() {
            const gallery = JSON.parse(localStorage.getItem('gallery') || '[]');
            const grid = document.getElementById('gallery-grid');
            
            if (gallery.length === 0) {
                grid.innerHTML = '<p style="text-align:center;color:#888;">暂无作品</p>';
                return;
            }
            
            grid.innerHTML = gallery.map(item => `
                <div class="gallery-item">
                    ${item.type === 'image' 
                        ? `<img src="${item.url}" alt="">`
                        : `<video src="${item.url}" controls></video>`
                    }
                    <div class="info">
                        <h4>${item.model}</h4>
                        <p>${item.prompt.slice(0, 50)}...</p>
                        <p>${new Date(item.time).toLocaleString()}</p>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
